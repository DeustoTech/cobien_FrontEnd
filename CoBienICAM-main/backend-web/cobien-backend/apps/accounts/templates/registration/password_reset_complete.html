{% load static %}
{% load i18n %}

<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>{% blocktrans %}Contraseña cambiada{% endblocktrans %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>

<div class="auth-page">
  <div class="auth-container">
    <h2>{% blocktrans %}¡Listo!{% endblocktrans %}</h2>
    <p>{% blocktrans %}Tu contraseña se ha cambiado correctamente.{% endblocktrans %}</p>
    <p><a class="btn-primary" href="{% url 'login' %}">{% blocktrans %}Iniciar sesión{% endblocktrans %}</a></p>
  </div>
</div>

</body>
</html>
